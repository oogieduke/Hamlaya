<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Hamlaya rassemble des creations video, jeux de societe et jeux video."
    />
    <title>Hamlaya</title>
    <link rel="preload" href="logo.png" as="image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas class="frost-canvas" aria-hidden="true"></canvas>

    <main class="page-shell">
      <section class="brand-stage" aria-label="Hamlaya">
        <div class="aurora" aria-hidden="true"></div>
        <img class="brand-logo" src="logo.png" alt="Logo Hamlaya" />
        <p class="brand-tagline">Studio &middot; Jeux &middot; Créations</p>
      </section>

      <section class="projects" aria-label="Projets">
        <a
          class="project-tile project-tile--gold"
          href="https://kingdom.hamlaya.com"
          aria-label="Ouvrir Kingdom Reforged"
        >
          <span class="project-kicker">Projet</span>
          <strong>Kingdom Reforged</strong>
          <span>Editor</span>
        </a>
        <a
          class="project-tile project-tile--ice"
          href="https://exp.hamlaya.com"
          aria-label="Ouvrir Kingdom Expeditions"
        >
          <span class="project-kicker">Prototype</span>
          <strong>Kingdom Expeditions</strong>
          <span>Game</span>
        </a>
        <a
          class="project-tile project-tile--rose"
          href="https://crush.hamlaya.com"
          aria-label="Ouvrir Crush"
        >
          <span class="project-kicker">Jeu</span>
          <strong>Crush</strong>
          <span>Clone Candy Crush</span>
        </a>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
